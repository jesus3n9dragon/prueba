<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Angry Birds HTML</title>
<style>
body{margin:0;background:#87CEEB;font-family:Arial;text-align:center}
canvas{background:#cfefff;border:2px solid #333;display:block;margin:10px auto}
button{padding:10px 20px;font-size:18px;cursor:pointer}
#ui{color:#111}
</style>
</head>
<body>
<h1>Angry Birds HTML</h1>
<div id="ui">
<button id="start">Jugar</button>
<p id="msg">Elimina todos los cerdos para avanzar.</p>
</div>
<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const msg=document.getElementById("msg");

let level=0, started=false;
const levels=[
[{x:700,y:390,r:20},{x:780,y:390,r:20}],
[{x:650,y:390,r:20},{x:730,y:390,r:20},{x:810,y:390,r:20},{x:770,y:330,r:20}]
];

let pigs=[];
let bird={x:150,y:380,r:18,vx:0,vy:0};
let dragging=false;
let launched=false;
const gravity=0.35;

function loadLevel(i){
 pigs=JSON.parse(JSON.stringify(levels[i]));
 bird={x:150,y:380,r:18,vx:0,vy:0};
 launched=false;
 msg.textContent="Nivel "+(i+1);
}

document.getElementById("start").onclick=()=>{
 started=true;
 level=0;
 loadLevel(0);
};

canvas.addEventListener("mousedown",e=>{
 if(!started||launched) return;
 dragging=true;
});

canvas.addEventListener("mousemove",e=>{
 if(!dragging) return;
 const rect=canvas.getBoundingClientRect();
 bird.x=e.clientX-rect.left;
 bird.y=e.clientY-rect.top;
});

canvas.addEventListener("mouseup",()=>{
 if(!dragging) return;
 dragging=false;
 bird.vx=(150-bird.x)*0.18;
 bird.vy=(380-bird.y)*0.18;
 launched=true;
});

function update(){
 if(launched){
   bird.vy+=gravity;
   bird.x+=bird.vx;
   bird.y+=bird.vy;

   pigs=pigs.filter(p=>{
      const dx=bird.x-p.x;
      const dy=bird.y-p.y;
      return Math.hypot(dx,dy)>bird.r+p.r;
   });

   if(bird.y>470){
      bird.y=470;
      bird.vy*=-0.4;
      bird.vx*=0.9;
   }
 }

 if(pigs.length===0 && started){
    level++;
    if(level<levels.length){
       loadLevel(level);
    }else{
       msg.textContent="¡Ganaste todos los niveles!";
       started=false;
    }
 }
}

function draw(){
 ctx.clearRect(0,0,900,500);

 ctx.fillStyle="#6ab04c";
 ctx.fillRect(0,450,900,50);

 ctx.strokeStyle="#654321";
 ctx.lineWidth=8;
 ctx.beginPath();
 ctx.moveTo(130,420);
 ctx.lineTo(150,350);
 ctx.stroke();

 ctx.fillStyle="red";
 ctx.beginPath();
 ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2);
 ctx.fill();

 pigs.forEach(p=>{
   ctx.fillStyle="green";
   ctx.beginPath();
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fill();
 });
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
